# Shared cloudflared wiring. Prefer: bash infra/cloud/common/cloudflared/up.sh <site>
# Per-VPS secret: ./site.env  →  CF_TUNNEL_TOKEN=...

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: always
    env_file: ./site.env
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    networks:
      - tunnel-net

networks:
  tunnel-net:
    name: init_tunnel-net
    external: true

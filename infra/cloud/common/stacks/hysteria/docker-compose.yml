# Canonical Hy2 compose for hosts/digi|ali|azure.
# bash infra/cloud/common/stacks/hysteria/up.sh digi
#
# Paths are relative to --project-directory = hosts/<host>/hysteria/

services:
  hysteria:
    image: ${HY2_IMAGE:-tobyxdd/hysteria:v2}
    container_name: hysteria2
    restart: always
    network_mode: host
    volumes:
      - ../../../common/stacks/hysteria/defaults.yaml:/etc/hysteria/defaults.yaml:ro
      - ./site.yaml:/etc/hysteria/site.yaml:ro
      - ./acme:/etc/hysteria/acme
    entrypoint: ["sh", "-c"]
    command:
      - cat /etc/hysteria/defaults.yaml /etc/hysteria/site.yaml > /tmp/hy2.yaml && exec hysteria server -c /tmp/hy2.yaml

# Thin alias — Prefer: bash ../../common/ss-rust/up.sh ali

services:
  ss-rust:
    image: teddysun/shadowsocks-rust
    container_name: ss-rust
    restart: always
    network_mode: host
    volumes:
      - ./config.json:/etc/shadowsocks-rust/config.json:ro
    command: ssserver -c /etc/shadowsocks-rust/config.json

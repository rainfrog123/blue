services:
  hysteria:
    image: tobyxdd/hysteria:v2
    container_name: hysteria2
    restart: always
    network_mode: host
    volumes:
      - ../../common/hysteria/defaults.yaml:/etc/hysteria/defaults.yaml:ro
      - ./site.yaml:/etc/hysteria/site.yaml:ro
      - ./acme:/etc/hysteria/acme
    entrypoint: ["sh", "-c"]
    command:
      - cat /etc/hysteria/defaults.yaml /etc/hysteria/site.yaml > /tmp/hy2.yaml && exec hysteria server -c /tmp/hy2.yaml

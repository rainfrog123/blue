# Shared xray-trojan (CF tunnel origin) for digi / ali / azure.
# Run: bash infra/cloud/common/xray-trojan/up.sh digi
# Requires external docker network: init_tunnel-net

services:
  xray-trojan:
    image: ghcr.io/xtls/xray-core:latest
    container_name: xray-trojan
    restart: always
    volumes:
      - ../../common/xray-trojan/config.json:/etc/xray/config.json:ro
    command: ["run", "-c", "/etc/xray/config.json"]
    networks:
      - tunnel-net

networks:
  tunnel-net:
    name: init_tunnel-net
    external: true

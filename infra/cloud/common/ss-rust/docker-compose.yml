# Shared SS-rust wiring. Prefer: bash infra/cloud/common/ss-rust/up.sh <site>
# Host network so IPv6 (::) from defaults.json works on every VPS.

services:
  ss-rust:
    image: teddysun/shadowsocks-rust
    container_name: ss-rust
    restart: always
    network_mode: host
    volumes:
      - ./config.json:/etc/shadowsocks-rust/config.json:ro
    command: ssserver -c /etc/shadowsocks-rust/config.json

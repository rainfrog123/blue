<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Zoom Per Tab settings</title>
	<style>
		:root {
			color-scheme: light dark;
		}
		body {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
			width: 300px;
			margin: 0;
			padding: 14px 16px;
			font-size: 13px;
		}
		h1 {
			font-size: 14px;
			margin: 0 0 10px;
		}
		fieldset {
			border: 1px solid rgba(128, 128, 128, 0.4);
			border-radius: 8px;
			padding: 10px 12px;
			margin: 0 0 12px;
		}
		legend {
			padding: 0 6px;
			font-weight: 600;
		}
		label.radio {
			display: flex;
			align-items: center;
			gap: 8px;
			margin: 6px 0;
			cursor: pointer;
		}
		textarea {
			width: 100%;
			box-sizing: border-box;
			min-height: 90px;
			resize: vertical;
			font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
			font-size: 12px;
			border-radius: 6px;
			border: 1px solid rgba(128, 128, 128, 0.4);
			padding: 6px 8px;
			margin-top: 6px;
			background: transparent;
			color: inherit;
		}
		textarea:disabled {
			opacity: 0.45;
		}
		.hint {
			color: rgba(128, 128, 128, 0.95);
			font-size: 11px;
			margin: 4px 0 0;
			line-height: 1.4;
		}
		.row {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 10px;
		}
		button {
			background: #1a73e8;
			color: #fff;
			border: none;
			border-radius: 6px;
			padding: 8px 14px;
			font-size: 13px;
			font-weight: 600;
			cursor: pointer;
		}
		button:hover { background: #1666c9; }
		#status {
			font-size: 12px;
			color: #1a8a3a;
			opacity: 0;
			transition: opacity 0.2s;
		}
		#status.show { opacity: 1; }
	</style>
</head>
<body>
	<h1>Zoom Per Tab</h1>
	<fieldset>
		<legend>Apply per-tab zoom on</legend>
		<label class="radio">
			<input type="radio" name="mode" value="all"> All websites
		</label>
		<label class="radio">
			<input type="radio" name="mode" value="specific"> Only these sites
		</label>
		<textarea id="sites" placeholder="gemini.google.com&#10;*.youtube.com&#10;example.com"></textarea>
		<p class="hint">One domain per line. Use <code>*.example.com</code> to include subdomains. Protocols and paths are ignored.</p>
	</fieldset>
	<div class="row">
		<button id="save">Save</button>
		<span id="status">Saved</span>
	</div>
	<script src="popup.js"></script>
</body>
</html>

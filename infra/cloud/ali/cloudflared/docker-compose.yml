# Thin alias — Prefer: bash ../../common/cloudflared/up.sh ali

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: always
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    env_file:
      - .env
    networks:
      - tunnel-net

networks:
  tunnel-net:
    name: init_tunnel-net
    external: true

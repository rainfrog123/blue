# DNS Configuration
dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: false
  use-hosts: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.localhost"
    - "localhost.ptlogin2.qq.com"
    - "+.ntp.org"
    - "ntp.org"
    - "+.stun.*.*"
    - "+.stun.*.*.*"
    - "+.stun.*.*.*.*"
    - "+.stun.*.*.*.*.*"
    - "*.nintendo.net"
    - "+.stun.playstation.net"
    - "xbox.*.*.microsoft.com"
    - "*.*.xboxlive.com"
    - "*.msftncsi.com"
    - "*.msftconnecttest.com"
    - "WORKGROUP"

  # Bootstrap DNS
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # Primary DNS (China - Alibaba & Tencent)
  nameserver:
    - 223.5.5.5
    - 223.6.6.6
    - 119.29.29.29

  # Fallback DNS (foreign - for GFW-blocked domains, goes through proxy)
  fallback:
    - 1.1.1.1
    - 8.8.8.8
    - 8.8.4.4

  # DNS for proxy servers
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # Fallback filter - route China IPs to nameserver, others to fallback
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32
      - 127.0.0.1/32
    domain:
      - "+.google.com"
      - "+.facebook.com"
      - "+.youtube.com"
      - "+.twitter.com"
      - "+.github.com"
      - "+.googleapis.com"
      - "+.gstatic.com"

